name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # MCP-240: third-party action pinned to mutable tag instead of commit SHA
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@main
      - name: Install
        run: pip install -r requirements.txt
      - name: Smoke test
        run: python -c "import server"
